<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Shared Delivery Portal</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2933;
      --subtext: #667085;
      --line: #e4e7ec;
      --primary: #1f4e78;
      --primary-light: #eaf2f8;
      --success: #157347;
      --success-bg: #e8f5ee;
      --warning: #b54708;
      --warning-bg: #fff4e5;
      --danger: #b42318;
      --danger-bg: #feeceb;
      --shadow: 0 5px 18px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        Meiryo,
        sans-serif;
    }

    .portal-header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .portal-header-inner {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .portal-brand {
      min-width: 0;
    }

    .portal-title {
      margin: 0;
      color: var(--primary);
      font-size: 23px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .portal-subtitle {
      margin-top: 4px;
      color: var(--subtext);
      font-size: 13px;
    }

    .portal-job-no {
      flex-shrink: 0;
      padding: 8px 12px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
    }

    .portal-main {
      width: min(1120px, calc(100% - 32px));
      margin: 26px auto 50px;
    }

    .loading-box,
    .error-box {
      padding: 28px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .loading-box {
      color: var(--subtext);
    }

    .error-box {
      display: none;
      color: var(--danger);
      background: var(--danger-bg);
      border: 1px solid #f3b8b3;
    }

    .portal-content {
      display: none;
    }

    .status-card {
      padding: 22px 24px;
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .status-label {
      color: var(--subtext);
      font-size: 13px;
      margin-bottom: 7px;
    }

    .status-value {
      font-size: 24px;
      font-weight: 700;
    }

    .status-badge {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
    }

    .status-planned {
      color: var(--warning);
      background: var(--warning-bg);
    }

    .status-departed,
    .status-arrived,
    .status-customs {
      color: var(--primary);
      background: var(--primary-light);
    }

    .status-permitted {
      color: var(--success);
      background: var(--success-bg);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .summary-card {
      min-width: 0;
      padding: 18px 20px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .summary-label {
      color: var(--subtext);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .summary-value {
      font-size: 19px;
      font-weight: 700;
      word-break: break-word;
    }

    .section-card {
      margin-bottom: 18px;
      padding: 22px;
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .section-title {
      margin: 0 0 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      color: var(--primary);
      font-size: 17px;
      font-weight: 700;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px 20px;
    }

    .info-item {
      min-width: 0;
    }

    .info-item.full {
      grid-column: 1 / -1;
    }

    .info-label {
      margin-bottom: 5px;
      color: var(--subtext);
      font-size: 12px;
    }

    .info-value {
      min-height: 20px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .delivery-card,
    .container-card,
    .document-row {
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
    }

    .delivery-card + .delivery-card,
    .container-card + .container-card,
    .document-row + .document-row {
      margin-top: 12px;
    }

    .delivery-header,
    .container-header,
    .document-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .delivery-title,
    .container-title {
      font-size: 15px;
      font-weight: 700;
    }

    .delivery-date {
      padding: 7px 10px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .delivery-body,
    .container-body {
      margin-top: 14px;
    }

    .delivery-grid,
    .container-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px 18px;
    }

    .document-info {
      min-width: 0;
    }

    .document-name {
      font-size: 14px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .document-meta {
      margin-top: 4px;
      color: var(--subtext);
      font-size: 12px;
    }

    .document-button {
      flex-shrink: 0;
      padding: 8px 13px;
      border: 0;
      border-radius: 7px;
      background: var(--primary);
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .document-button:disabled {
      background: #98a2b3;
      cursor: default;
    }

    .empty-message {
      padding: 16px;
      color: var(--subtext);
      background: #f8fafc;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
    }

    .portal-footer {
      margin-top: 26px;
      color: var(--subtext);
      font-size: 12px;
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 820px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .info-grid,
      .delivery-grid,
      .container-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .portal-header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .status-card {
        align-items: flex-start;
        flex-direction: column;
      }

      .info-grid,
      .delivery-grid,
      .container-grid {
        grid-template-columns: 1fr;
      }

      .delivery-header,
      .container-header,
      .document-row {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <header class="portal-header">
    <div class="portal-header-inner">
      <div class="portal-brand">
        <h1 class="portal-title">
          Shared Delivery Portal
        </h1>

        <div class="portal-subtitle">
          納品情報共有ページ
        </div>
      </div>

      <div
        id="header-job-no"
        class="portal-job-no"
      >
        -
      </div>
    </div>
  </header>

  <main class="portal-main">
    <div
      id="loading-box"
      class="loading-box"
    >
      配送情報を読み込んでいます...
    </div>

    <div
      id="error-box"
      class="error-box"
    ></div>

    <div
      id="portal-content"
      class="portal-content"
    >
      <section class="status-card">
        <div>
          <div class="status-label">
            現在の状況
          </div>

          <div
            id="current-status"
            class="status-value"
          >
            -
          </div>
        </div>

        <div
          id="status-badge"
          class="status-badge"
        >
          -
        </div>
      </section>

      <section class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">
            納品予定
          </div>

          <div
            id="summary-delivery"
            class="summary-value"
          >
            -
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-label">
            総重量
          </div>

          <div
            id="summary-weight"
            class="summary-value"
          >
            -
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-label">
            総容積
          </div>

          <div
            id="summary-cbm"
            class="summary-value"
          >
            -
          </div>
        </div>
      </section>

      <section class="section-card">
        <h2 class="section-title">
          本船情報
        </h2>

        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">本船名</div>
            <div id="vessel" class="info-value">-</div>
          </div>

          <div class="info-item">
            <div class="info-label">Voyage</div>
            <div id="voyage" class="info-value">-</div>
          </div>

          <div class="info-item">
            <div class="info-label">積出港</div>
            <div id="pol" class="info-value">-</div>
          </div>

          <div class="info-item">
            <div class="info-label">揚地港</div>
            <div id="pod" class="info-value">-</div>
          </div>

          <div class="info-item">
            <div class="info-label">出港予定日</div>
            <div id="etd" class="info-value">-</div>
          </div>

          <div class="info-item">
            <div class="info-label">到着予定日</div>
            <div id="eta" class="info-value">-</div>
          </div>

          <div class="info-item">
            <div class="info-label">申告日</div>
            <div
              id="customs-declared-date"
              class="info-value"
            >
              -
            </div>
          </div>

          <div class="info-item">
            <div class="info-label">輸入許可日</div>
            <div
              id="customs-permit-date"
              class="info-value"
            >
              -
            </div>
          </div>
        </div>
      </section>

      <section class="section-card">
        <h2 class="section-title">
          納品情報
        </h2>

        <div id="delivery-list"></div>
      </section>

      <section class="section-card">
        <h2 class="section-title">
          コンテナ・貨物情報
        </h2>

        <div id="container-list"></div>
      </section>

      <section class="section-card">
        <h2 class="section-title">
          添付書類
        </h2>

        <div id="document-list"></div>
      </section>

      <div class="portal-footer">
        本ページには最新の納品情報が表示されます。<br>
        ブックマークされた場合も、同じURLから最新情報をご確認いただけます。
      </div>
    </div>
  </main>

  <script>
    const state = {
      token: '',
      data: null
    };

    document.addEventListener('DOMContentLoaded', function() {
      loadSharedDelivery();
    });

    async function loadSharedDelivery() {
      const params = new URLSearchParams(
        window.location.search
      );

      state.token = String(
        params.get('token') || ''
      ).trim();

      if (!state.token) {
        showError(
          '共有URLが正しくありません。共有元へ再度ご確認ください。'
        );
        return;
      }

      try {
        const response = await fetch(
          `/api/shared-delivery/detail?token=${encodeURIComponent(state.token)}`,
          {
            method: 'GET',
            headers: {
              Accept: 'application/json'
            }
          }
        );

        const result = await response.json();

        if (!response.ok || !result.success) {
          throw new Error(
            result.message ||
            '配送情報を取得できませんでした'
          );
        }

        state.data = result;

        renderPortal(result);
      } catch (error) {
        console.error(
          'Shared Delivery load error:',
          error
        );

        showError(
          error.message ||
          '配送情報の読み込みに失敗しました'
        );
      }
    }

    function renderPortal(data) {
      const shipment = data.shipment || {};
      const totals = data.totals || {};
      const deliveries = Array.isArray(data.deliveries)
        ? data.deliveries
        : [];
      const containers = Array.isArray(data.containers)
        ? data.containers
        : [];
      const documents = Array.isArray(data.documents)
        ? data.documents
        : [];

      setText(
        'header-job-no',
        shipment.job_no || '-'
      );

      renderStatus(
        shipment.public_status || '出港予定'
      );

      setText(
        'summary-delivery',
        getSummaryDelivery(deliveries)
      );

      setText(
        'summary-weight',
        formatWeight(totals.gross_weight)
      );

      setText(
        'summary-cbm',
        formatCbm(totals.cbm)
      );

      setText('vessel', shipment.vessel);
      setText('voyage', shipment.voyage);
      setText('pol', shipment.pol);
      setText('pod', shipment.pod);

      setText(
        'etd',
        formatDate(shipment.etd)
      );

      setText(
        'eta',
        formatDate(shipment.eta)
      );

      setText(
        'customs-declared-date',
        formatDate(
          shipment.customs_declared_date
        )
      );

      setText(
        'customs-permit-date',
        formatDate(
          shipment.customs_permit_date
        )
      );

      renderDeliveries(deliveries);
      renderContainers(containers);
      renderDocuments(documents);

      document.getElementById(
        'loading-box'
      ).style.display = 'none';

      document.getElementById(
        'portal-content'
      ).style.display = 'block';
    }

    function renderStatus(status) {
      const statusText = status || '出港予定';

      setText(
        'current-status',
        statusText
      );

      const badge =
        document.getElementById('status-badge');

      badge.textContent = statusText;
      badge.className = 'status-badge';

      if (statusText === '輸入許可') {
        badge.classList.add(
          'status-permitted'
        );
      } else if (statusText === '通関中') {
        badge.classList.add(
          'status-customs'
        );
      } else if (statusText === '到着済み') {
        badge.classList.add(
          'status-arrived'
        );
      } else if (statusText === '出港済み') {
        badge.classList.add(
          'status-departed'
        );
      } else {
        badge.classList.add(
          'status-planned'
        );
      }
    }

    function renderDeliveries(deliveries) {
      const container =
        document.getElementById('delivery-list');

      if (!deliveries.length) {
        container.innerHTML = `
          <div class="empty-message">
            納品情報はまだ登録されていません。
          </div>
        `;
        return;
      }

      container.innerHTML = deliveries.map(
        function(delivery, index) {
          const deliveryDateTime = [
            formatDate(delivery.delivery_date),
            delivery.delivery_time || ''
          ].filter(function(value) {
            return value && value !== '-';
          }).join(' ');

          return `
            <article class="delivery-card">
              <div class="delivery-header">
                <div class="delivery-title">
                  ${escapeHtml(
                    delivery.delivery_dest_name ||
                    `納品先 ${index + 1}`
                  )}
                </div>

                <div class="delivery-date">
                  ${escapeHtml(
                    deliveryDateTime || '日時未定'
                  )}
                </div>
              </div>

              <div class="delivery-body">
                <div class="delivery-grid">
                  ${infoHtml(
                    '品名',
                    delivery.commodity
                  )}

                  ${infoHtml(
                    '納品先住所',
                    delivery.delivery_address
                  )}

                  ${infoHtml(
                    '電話番号',
                    delivery.delivery_tel
                  )}

                  ${infoHtml(
                    'ご担当者',
                    delivery.delivery_contact
                  )}

                  ${infoHtml(
                    '車種',
                    delivery.vehicle_type
                  )}

                  ${infoHtml(
                    '運送会社',
                    delivery.carrier_name
                  )}

                  ${infoHtml(
                    '車番',
                    delivery.vehicle_no
                  )}

                  ${infoHtml(
                    'ドライバー',
                    delivery.driver_name
                  )}

                  ${infoHtml(
                    'ドライバー連絡先',
                    delivery.driver_phone
                  )}

                  ${
                    delivery.remarks
                      ? `
                        <div class="info-item full">
                          <div class="info-label">
                            備考
                          </div>
                          <div class="info-value">
                            ${escapeHtml(
                              delivery.remarks
                            )}
                          </div>
                        </div>
                      `
                      : ''
                  }
                </div>
              </div>
            </article>
          `;
        }
      ).join('');
    }

    function renderContainers(containers) {
      const container =
        document.getElementById('container-list');

      if (!containers.length) {
        container.innerHTML = `
          <div class="empty-message">
            コンテナ・貨物情報はありません。
          </div>
        `;
        return;
      }

      container.innerHTML = containers.map(
        function(item, index) {
          return `
            <article class="container-card">
              <div class="container-header">
                <div class="container-title">
                  コンテナ ${index + 1}
                </div>
              </div>

              <div class="container-body">
                <div class="container-grid">
                  ${infoHtml(
                    'コンテナ番号',
                    item.container_no
                  )}

                  ${infoHtml(
                    'コンテナサイズ',
                    formatContainerType(
                      item.container_type
                    )
                  )}

                  ${infoHtml(
                    'シール番号',
                    item.seal_no
                  )}

                  ${infoHtml(
                    '梱包',
                    formatPackageDescription(
                      item.package_description
                    )
                  )}

                  ${infoHtml(
                    '重量',
                    formatWeight(
                      item.gross_weight
                    )
                  )}

                  ${infoHtml(
                    '容積',
                    formatCbm(item.cbm)
                  )}
                </div>
              </div>
            </article>
          `;
        }
      ).join('');
    }

    function renderDocuments(documents) {
      const container =
        document.getElementById('document-list');

      if (!documents.length) {
        container.innerHTML = `
          <div class="empty-message">
            現在、共有書類はありません。
          </div>
        `;
        return;
      }

      container.innerHTML = documents.map(
        function(documentItem) {
          return `
            <div class="document-row">
              <div class="document-info">
                <div class="document-name">
                  ${escapeHtml(
                    documentItem.file_name ||
                    '共有書類'
                  )}
                </div>

                <div class="document-meta">
                  ${escapeHtml(
                    formatDocumentType(
                      documentItem.document_type
                    )
                  )}
                  ・
                  ${escapeHtml(
                    formatDateTime(
                      documentItem.uploaded_at
                    )
                  )}
                </div>
              </div>

              <button
                type="button"
                class="document-button"
                disabled
                title="書類表示APIは次の工程で追加します"
              >
                表示準備中
              </button>
            </div>
          `;
        }
      ).join('');
    }

    function getSummaryDelivery(deliveries) {
      if (!deliveries.length) {
        return '未定';
      }

      const first = deliveries[0];

      return [
        formatDate(first.delivery_date),
        first.delivery_time || ''
      ].filter(function(value) {
        return value && value !== '-';
      }).join(' ') || '未定';
    }

    function infoHtml(label, value) {
      return `
        <div class="info-item">
          <div class="info-label">
            ${escapeHtml(label)}
          </div>

          <div class="info-value">
            ${escapeHtml(
              normalizeValue(value)
            )}
          </div>
        </div>
      `;
    }

    function setText(id, value) {
      const element =
        document.getElementById(id);

      if (!element) return;

      element.textContent =
        normalizeValue(value);
    }

    function normalizeValue(value) {
      if (
        value === null ||
        value === undefined ||
        value === ''
      ) {
        return '-';
      }

      return String(value);
    }

    function formatDate(value) {
      if (!value) return '-';

      const normalized = String(value)
        .trim()
        .replace(/\//g, '-');

      const date = new Date(
        `${normalized.slice(0, 10)}T00:00:00`
      );

      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return new Intl.DateTimeFormat(
        'ja-JP',
        {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        }
      ).format(date);
    }

    function formatDateTime(value) {
      if (!value) return '-';

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return new Intl.DateTimeFormat(
        'ja-JP',
        {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        }
      ).format(date);
    }

    function formatWeight(value) {
      const number = Number(value);

      if (!Number.isFinite(number)) {
        return '-';
      }

      return `${number.toLocaleString('ja-JP')} kg`;
    }

    function formatCbm(value) {
      const number = Number(value);

      if (!Number.isFinite(number)) {
        return '-';
      }

      return `${number.toLocaleString('ja-JP')} CBM`;
    }

    function formatPackageDescription(value) {
      if (
        value === null ||
        value === undefined ||
        value === ''
      ) {
        return '-';
      }

      return String(value)
        .replace(/(\d)([A-Za-z])/g, '$1 $2')
        .toUpperCase();
    }

    function formatContainerType(value) {
      const type = String(value || '').trim();

      if (!type) return '-';

      const map = {
        CT01: '20FT',
        CT02: '40FT',
        CT03: '40HQ'
      };

      return map[type] || type;
    }

    function formatDocumentType(value) {
      const type = String(value || '').trim();

      const map = {
        packing_list: 'Packing List',
        delivery_order: '配送依頼書',
        invoice: 'Invoice',
        permit: '輸入許可書',
        other: 'その他'
      };

      return map[type] || type || '共有書類';
    }

    function showError(message) {
      document.getElementById(
        'loading-box'
      ).style.display = 'none';

      const box =
        document.getElementById('error-box');

      box.textContent = message;
      box.style.display = 'block';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
